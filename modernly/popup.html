<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    color: #111;
    padding: 14px;
    border-radius: 4px;
  }

  @supports not (backdrop-filter: blur(1px)) {
    body { background: #fff; }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo {
    display: block;
    height: 28px;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: #111;
    line-height: 1;
  }

  .field-label {
    display: block;
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    height: 34px;
    padding: 0 10px;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 3px;
    color: #111;
    font-family: monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    display: block;
  }
  input:focus { border-color: #4A9EDB; }
  input::placeholder { color: #bbb; }

  .save-btn {
    margin-top: 6px;
    width: 100%;
    height: 34px;
    background: #4A9EDB;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .save-btn:hover { filter: brightness(1.08); }

  .status {
    min-height: 18px;
    font-size: 11px;
    color: transparent;
    margin-top: 5px;
    transition: color 0.2s;
  }
  .status.success { color: #27ae60; }
  .status.info { color: #888; }

  .divider {
    height: 0;
    border-top: 0.5px solid rgba(0,0,0,0.08);
    margin: 10px 0;
  }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
  }
  .toggle-label {
    font-size: 12px;
    color: #111;
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.12);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #aaa;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .slider { background: #4A9EDB; }
  .toggle input:checked + .slider::before { transform: translateX(18px); background: #fff; }

  .cache-stats {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .cache-stat {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
  }
  .cache-stat-num {
    font-size: 18px;
    font-weight: 500;
    color: #4A9EDB;
    line-height: 1.1;
  }
  .cache-stat-label {
    font-size: 9px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .clear-btn {
    width: 100%;
    height: 32px;
    background: transparent;
    color: #888;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .clear-btn:hover {
    color: #c0392b;
    border-color: rgba(192,57,43,0.3);
  }

  .hint {
    font-size: 10px;
    color: #999;
    line-height: 1.6;
  }
  .shortcut {
    font-size: 10px;
    color: #bbb;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="icons/icon48.png" alt="Longyan">
  <span class="wordmark">Longyan</span>
</div>

<span class="field-label">Anthropic API Key</span>
<input type="password" id="apiKey" placeholder="sk-ant-api03-…" />
<button class="save-btn" id="saveBtn">Save</button>
<div class="status" id="status"></div>

<div class="divider"></div>

<div class="toggle-row">
  <span class="toggle-label">Active</span>
  <label class="toggle">
    <input type="checkbox" id="activeToggle" checked>
    <span class="slider"></span>
  </label>
</div>

<div class="divider"></div>

<div class="cache-stats">
  <div class="cache-stat">
    <div class="cache-stat-num" id="wordCount">0</div>
    <div class="cache-stat-label">Words</div>
  </div>
  <div class="cache-stat">
    <div class="cache-stat-num" id="phraseCount">0</div>
    <div class="cache-stat-label">Phrases</div>
  </div>
</div>
<button class="clear-btn" id="clearBtn">Clear cache</button>

<div class="divider"></div>

<p class="hint">Highlight Chinese text on any page to get word-by-word pinyin and translations. Click a highlighted word or phrase to reopen its card.</p>
<p class="shortcut">Ctrl+Shift+T to toggle on/off</p>

<script src="popup.js"></script>
</body>
</html>
